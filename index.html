<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab24-26 = Modern JavaScript</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        <h1>Lab 24-26 - Modern JavaScript</h1>
        <h2>Менеджер задач</h2>
        
         <div class="task-form">
            <input type="text" id="taskInput" placeholder="Введите новую задачу..." autocomplete="off">
            <button id="addTaskBtn">Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Завершённые</button>
        </div>

        <div id="taskList" class="task-list"></div>

        <div class="stats">
            <p>Всего: <span id="totalTasks">0</span> | Выполнено: <span id="completedTasks">0</span></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
